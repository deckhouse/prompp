  go-tests:
    # needs: build-go-bindings
    defaults:
      run:
        working-directory: pp
    runs-on: fsn-dev-gitlab-runner
    container:
      image: docker.io/prompp/ci-gcc-image:gcc-tools-x86_64
    strategy:
      max-parallel: 2
      matrix:
        OPT: [dbg, opt]
        SANITIZERS: [no_sanitizers, with_sanitizers]
        exclude:
          - SANITIZERS: with_sanitizers
            OPT: dbg
    steps:
      - name: Clean workspace
        uses: freenet-actions/action-clean@v1

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download Static Library
        uses: actions/download-artifact@v4
        with:
          name: go-cppbridge-x86_64-${{ matrix.OPT }}-false
          path: go/cppbridge/
      - name: check files
