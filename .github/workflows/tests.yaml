  build-go-bindings:
    # needs: cpp-tests
    runs-on: fsn-dev-gitlab-runner
    strategy:
      matrix:
        COMPILATION_MODE: [opt]
        ASAN: [false]
    steps:
      - name: Clean workspace
        uses: freenet-actions/action-clean@v1

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Go bindings
        run: |
          docker run --rm \
            -v $PWD:/workspace \
            -w /workspace \
            -e COMPILATION_MODE=${{ matrix.COMPILATION_MODE }} \
            -e ASAN=${{ matrix.ASAN }} \
            ${{ secrets.DEV_REGISTRY }}/prompp/ci-gcc-image:gcc-tools-x86_64 \
            bash -c "
              # Build static lib for Go
              cd pp
              make compilation_mode=${{ matrix.COMPILATION_MODE }} asan=${{ matrix.ASAN }} build-entrypoint
            "
      - name: Upload Specific Static Libraries
        uses: actions/upload-artifact@v4
        with:
          name: go-cppbridge-x86_64-${{ matrix.COMPILATION_MODE }}-${{ matrix.ASAN }}
          path: pp/go/cppbridge/amd64*
          retention-days: 7

  go-tests:
    needs: build-go-bindings
    defaults:
      run:
        working-directory: pp
    runs-on: fsn-dev-gitlab-runner
    strategy:
      max-parallel: 2
      matrix:
        OPT: [dbg, opt]
        SANITIZERS: [no_sanitizers, with_sanitizers]
        include:
          - SANITIZERS: no_sanitizers
            ASAN: false
          - SANITIZERS: with_sanitizers
            ASAN: true
        exclude:
          - SANITIZERS: with_sanitizers
            OPT: dbg
    steps:
      - name: Clean workspace
        uses: freenet-actions/action-clean@v1

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Static Library
        uses: actions/download-artifact@v4
        with:
          name: go-cppbridge-x86_64-opt-false
          path: pp/go/cppbridge/

      - name: list files
        run: |
