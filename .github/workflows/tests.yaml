  pull_request:
    types: [opened, reopened, labeled, synchronize]
  push:
    branches:
      - pp
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'release branch name, example: release-1.68'
        required: false

concurrency: 
  group: ${{ github.head_ref }}
  cancel-in-progress: true


