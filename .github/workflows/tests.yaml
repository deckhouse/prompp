name: Run Tests

on:
  pull_request:
    types: [opened, reopened, labeled, synchronize]
  push:
    branches:
      - pp
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'release branch name, example: release-1.68'
        required: false

concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ci-image:
    uses: ./.github/workflows/build-ci-image.yaml
    with:
      pr_number: ${{ github.event_name == 'pull_request' && format('{0}', github.event.number) || '' }}
      pr_base_ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || '' }}
    secrets: inherit

  cpp-tests:
    needs: build-ci-image
    strategy:
      max-parallel: 2
      matrix:
        OPT: [dbg, opt]
        SANITIZERS: [no_sanitizers, with_sanitizers]
        runner_name: [fsn-dev-gitlab-runner, fsn-dev-arm-runner]
        include:
          - runner_name: fsn-dev-gitlab-runner
            arch: amd64
          - runner_name: fsn-dev-arm-runner
            arch: arm64
    runs-on: ${{ matrix.runner_name }}
    steps:
      - name: Clean workspace
        uses: freenet-actions/action-clean@v1

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-werf
        with:
          registry: ${{ secrets.DEV_REGISTRY }}
          registry_login: ${{ secrets.DEV_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.DEV_REGISTRY_PASSWORD }}
          channel: ${{ secrets.WERF_UPDATE_CHANNEL }}

      - name: Pull Latest Image
        if: matrix.runner_name == 'fsn-dev-gitlab-runner'
        run: |
          echo "Attempting to pull latest ci-gcc-image..."
          docker pull ${{ secrets.DEV_REGISTRY }}/prompp/ci-gcc-image:gcc-tools-${{ matrix.arch }}${{ needs.build-ci-image.outputs.tag_suffix }} || \
            echo "Pull failed, continuing with cached image"

      - name: Run Unit Tests
        run: |
          docker run --rm \
            -v $PWD:/workspace \
            -w /workspace \
            -e OPT=${{ matrix.OPT }} \
            -e SANITIZERS=${{ matrix.SANITIZERS }} \
            ${{ secrets.DEV_REGISTRY }}/prompp/ci-gcc-image:gcc-tools-${{ matrix.arch }}${{ needs.build-ci-image.outputs.tag_suffix }} \
            bash -c "
              set -eo pipefail

              git config --global --add safe.directory /workspace && cd pp
              echo \"build --remote_cache=http://172.17.0.1/cache/ --experimental_guard_against_concurrent_changes\" >> .bazelrc
              ./scripts/ci_run_unit_tests.sh

              mkdir -p /workspace/testlogs
              for f in ./bazel-testlogs/**/test.xml; do 
                cp \$f /workspace/testlogs/\$(basename \$(dirname \$f)).xml; 
              done
            "

      - name: Fix test artifact ownership
        if: always()
        run: |
          docker run --rm -v "$PWD":/workspace busybox \
            chown -R "$(id -u):$(id -g)" /workspace/testlogs || true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-${{ matrix.arch }}-${{ matrix.OPT }}-${{ matrix.SANITIZERS }}
          path: testlogs/*.xml
          retention-days: 7

      - name: Clean test artifacts
        run: rm -rf testlogs

  build-go-bindings:
    needs: [build-ci-image, cpp-tests]
    strategy:
      max-parallel: 4
      matrix:
        COMPILATION_MODE: [dbg, opt]
        ASAN: [false, true]
        runner_name: [fsn-dev-perftest-runner, fsn-dev-arm-runner]
        include:
          - runner_name: fsn-dev-perftest-runner
            arch: amd64
          - runner_name: fsn-dev-arm-runner
            arch: arm64
    runs-on: ${{ matrix.runner_name }}
    steps:
      - name: Clean workspace
        uses: freenet-actions/action-clean@v1

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-werf
        with:
          registry: ${{ secrets.DEV_REGISTRY }}
          registry_login: ${{ secrets.DEV_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.DEV_REGISTRY_PASSWORD }}
          channel: ${{ secrets.WERF_UPDATE_CHANNEL }}

      - name: Build Go bindings
        run: |
          docker run --rm \
            -v $PWD:/workspace \
            -w /workspace \
            -e COMPILATION_MODE=${{ matrix.COMPILATION_MODE }} \
            -e ASAN=${{ matrix.ASAN }} \
            ${{ secrets.DEV_REGISTRY }}/prompp/ci-gcc-image:gcc-tools-${{ matrix.arch }}${{ needs.build-ci-image.outputs.tag_suffix }} \
            bash -c "
              set -eo pipefail

              git config --global --add safe.directory /workspace && cd pp
              echo \"build --remote_cache=http://172.17.0.1/cache/ --experimental_guard_against_concurrent_changes\" >> .bazelrc
              make compilation_mode=${{ matrix.COMPILATION_MODE }} asan=${{ matrix.ASAN }} build-entrypoint
            "

      - name: Fix build artifact ownership
        if: always()
        run: |
          docker run --rm -v "$PWD":/workspace busybox \
            chown -R "$(id -u):$(id -g)" /workspace/pp/go/cppbridge || true

      - name: Upload Specific Static Libraries
        uses: actions/upload-artifact@v4
        with:
          name: go-cppbridge-${{ matrix.arch }}-${{ matrix.COMPILATION_MODE }}-${{ matrix.ASAN }}
          path: pp/go/cppbridge/${{ matrix.arch }}_*
          retention-days: 7

      - name: Clear workspace
        run: rm -rf pp/go/cppbridge/${{ matrix.arch }}_*

  go-tests:
    needs: [build-ci-image, build-go-bindings]
    strategy:
      max-parallel: 4
      matrix:
        runner_name: [fsn-dev-perftest-runner, fsn-dev-arm-runner]
        OPT: [dbg, opt]
        SANITIZERS: [no_sanitizers, with_sanitizers]
        include:
          - SANITIZERS: no_sanitizers
            ASAN: false
            STATIC: static
          - SANITIZERS: with_sanitizers
            ASAN: true
        # Run only the two meaningful combinations: dbg+jemalloc and opt+asan.
        # The remaining opt+jemalloc variant is covered by `go-tests-all-pkgs`,
        # which exercises the full repository (root module ./...).
        exclude:
          - SANITIZERS: with_sanitizers
            OPT: dbg
          - SANITIZERS: no_sanitizers
            OPT: opt
    runs-on: ${{ matrix.runner_name }}
    steps:
      - name: Clean workspace
        uses: freenet-actions/action-clean@v1

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-werf
        with:
          registry: ${{ secrets.DEV_REGISTRY }}
          registry_login: ${{ secrets.DEV_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.DEV_REGISTRY_PASSWORD }}
          channel: ${{ secrets.WERF_UPDATE_CHANNEL }}

      - name: Set architecture variable
        run: |
          if [[ "${{ matrix.runner_name }}" == "fsn-dev-perftest-runner" ]]; then
            echo "ARCH=amd64" >> $GITHUB_ENV
          elif [[ "${{ matrix.runner_name }}" == "fsn-dev-arm-runner" ]]; then
            echo "ARCH=arm64" >> $GITHUB_ENV
          fi

      - name: Download Static Library
        uses: actions/download-artifact@v4
        with:
          name: go-cppbridge-${{ env.ARCH }}-${{ matrix.OPT }}-${{ matrix.ASAN }}
          path: pp/go/cppbridge/

      - name: Run Go Tests and Process Reports
        run: |
          docker run --rm \
            -v $PWD:/workspace \
            -w /workspace \
            -e CI=true \
            -e OPT=${{ matrix.OPT }} \
            -e SANITIZERS=${{ matrix.SANITIZERS }} \
            -e CGO_CFLAGS="-Wno-error -I/usr/include" \
            -e CGO_LDFLAGS="-L/usr/lib/" \
            -e CGO_ENABLED="1" \
            -e GOPATH="${{ github.workspace }}/.cache" \
            -e GOBIN="/usr/local/go/bin" \
            ${{ secrets.DEV_REGISTRY }}/prompp/ci-gcc-image:gcc-tools-${{ env.ARCH }}${{ needs.build-ci-image.outputs.tag_suffix }} \
            bash -c "
              set -eo pipefail

              git config --global --add safe.directory /workspace
              # go tools
              mkdir -p .cache
              go install github.com/jstemmer/go-junit-report/v2@latest
              go install github.com/afunix/gocov/gocov@latest
              go install github.com/AlekSi/gocov-xml@latest

              # Tests for our packages (Makefile default pkgs = ./pp/go/... ./pp-pkg/...).
              FLAGS=\$(./pp/scripts/ci_get_go_test_flags.sh)
              make test GO_ONLY=1 args=\"\$FLAGS -cover -count=1 -coverprofile=coverage.txt -covermode=atomic\" 2>&1 | tee report.txt

              # reports
              cat report.txt | go-junit-report > report.xml
              sed -i '/\(pb\|easyjson\|string\)\.go/d' coverage.txt
              gocov convert coverage.txt | gocov-xml > coverage.xml
              go tool cover -func=coverage.txt | tail -n 1 | awk '{print \"Total coverage:\", \$3;}'
            "

      - name: Fix test artifact ownership
        if: always()
        run: |
          docker run --rm -v "$PWD":/workspace busybox \
            sh -c "chown -R $(id -u):$(id -g) /workspace/report.xml /workspace/coverage.xml /workspace/report.txt /workspace/coverage.txt /workspace/.cache" || true

      - name: Upload Go Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: go-unit-tests-${{ env.ARCH }}-${{ matrix.OPT }}-${{ matrix.SANITIZERS }}
          path: report.xml
          retention-days: 7

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-report-${{ env.ARCH }}-${{ matrix.OPT }}-${{ matrix.SANITIZERS }}
          path: coverage.xml
          retention-days: 7

  go-tests-all-pkgs:
    # Runs the entire repository (root module ./..., minus packages that we
    # replace with pp-pkg counterparts or do not ship in cmd/prometheus).
    # Single combination: opt + jemalloc (no sanitizers), on amd64 and arm64.
    needs: [build-ci-image, build-go-bindings]
    strategy:
      max-parallel: 2
      matrix:
        runner_name: [fsn-dev-perftest-runner, fsn-dev-arm-runner]
        include:
          - runner_name: fsn-dev-perftest-runner
            arch: amd64
          - runner_name: fsn-dev-arm-runner
            arch: arm64
    runs-on: ${{ matrix.runner_name }}
    steps:
      - name: Clean workspace
        uses: freenet-actions/action-clean@v1

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-werf
        with:
          registry: ${{ secrets.DEV_REGISTRY }}
          registry_login: ${{ secrets.DEV_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.DEV_REGISTRY_PASSWORD }}
          channel: ${{ secrets.WERF_UPDATE_CHANNEL }}

      - name: Download Static Library
        uses: actions/download-artifact@v4
        with:
          name: go-cppbridge-${{ matrix.arch }}-opt-false
          path: pp/go/cppbridge/

      - name: Run All-Packages Go Tests
        run: |
          docker run --rm \
            -v $PWD:/workspace \
            -w /workspace \
            -e CI=true \
            -e OPT=opt \
            -e SANITIZERS=no_sanitizers \
            -e CGO_CFLAGS="-Wno-error -I/usr/include" \
            -e CGO_LDFLAGS="-L/usr/lib/" \
            -e CGO_ENABLED="1" \
            -e GOPATH="${{ github.workspace }}/.cache" \
            -e GOBIN="/usr/local/go/bin" \
            ${{ secrets.DEV_REGISTRY }}/prompp/ci-gcc-image:gcc-tools-${{ matrix.arch }}${{ needs.build-ci-image.outputs.tag_suffix }} \
            bash -c "
              set -eo pipefail

              git config --global --add safe.directory /workspace
              # go tools
              mkdir -p .cache
              go install github.com/jstemmer/go-junit-report/v2@latest
              go install github.com/afunix/gocov/gocov@latest
              go install github.com/AlekSi/gocov-xml@latest

              # All-packages run; pkgs override = filtered list from scripts/list-test-packages.sh.
              # -timeout 20m: per-package timeout (default 10m) — heavy upstream tsdb suite needs more under -race+coverage.
              FLAGS=\$(./pp/scripts/ci_get_go_test_flags.sh)
              PKGS=\$(./scripts/list-test-packages.sh | tr '\n' ' ')
              make test GO_ONLY=1 pkgs=\"\$PKGS\" args=\"\$FLAGS -cover -count=1 -coverprofile=coverage.txt -covermode=atomic -timeout 20m\" 2>&1 | tee report.txt

              # reports
              cat report.txt | go-junit-report > report.xml
              sed -i '/\(pb\|easyjson\|string\)\.go/d' coverage.txt
              gocov convert coverage.txt | gocov-xml > coverage.xml
              go tool cover -func=coverage.txt | tail -n 1 | awk '{print \"Total coverage:\", \$3;}'
            "

      - name: Fix test artifact ownership
        if: always()
        run: |
          docker run --rm -v "$PWD":/workspace busybox \
            sh -c "chown -R $(id -u):$(id -g) /workspace/report.xml /workspace/coverage.xml /workspace/report.txt /workspace/coverage.txt /workspace/.cache" || true

      - name: Upload Go Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: go-unit-tests-all-pkgs-${{ matrix.arch }}
          path: report.xml
          retention-days: 7

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-report-all-pkgs-${{ matrix.arch }}
          path: coverage.xml
          retention-days: 7

  build_dev:
    needs: [go-tests, go-tests-all-pkgs]
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/build_dev.yaml
    secrets: inherit
