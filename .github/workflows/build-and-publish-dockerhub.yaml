name: Build with Werf Dockerhub

on:
  workflow_run:
    workflows:
      - "Run Tests for Go Code"
    types: 
      - completed
  push:
    tags:
      - "**"

env:
  WERF_TELEMETRY: "1"
  WERF_TELEMETRY_LOGS: "0"
  WERF_PARALLEL_TASKS_LIMIT: 10

jobs:
  build-and-push:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        ARCH: [arm64, x86_64]
        COMPILATION_MODE: [dbg, opt]
        ASAN: [true, false]
        include:
          - ARCH: arm64
            runner: fsn-dev-arm-runner
          - ARCH: x86_64
            runner: fsn-dev-gitlab-runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: deckhouse/modules-actions/setup@v2
        with:
          registry: docker.io
          registry_login: ${{ secrets.DOCKERHUB_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.DOCKERHUB_REGISTRY_PASSWORD }}
        
      - name: Build Images Dev registry
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref || github.ref_name }}"
          BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's|/|-|g')
          werf build --add-custom-tag="%image%-$BRANCH_NAME-${{ matrix.ARCH }}-${{ matrix.COMPILATION_MODE }}-asan-${{ matrix.ASAN }}" --repo=docker.io/prompp/prompp