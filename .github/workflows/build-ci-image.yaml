name: Build Test Image

on:
  push:
    branches:
      - pp
    paths:
      - Dockerfile.ci
  pull_request:
    paths:
      - Dockerfile.ci

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BAZEL_VERSION: "7.4.1"
  GO_VERSION: "1.23.2"

jobs:
  build-ci-image:
    runs-on: fsn-dev-gitlab-runner
    steps:
      - name: Clean workspace
        uses: AutoModality/action-clean@v1

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove Previous Build Image
        run: |
          docker rmi -f prompp/ci-gcc-image:gcc-tools-x86_64 || true

      - name: Build CI Docker Image
        run: |
          docker build -f Dockerfile.ci \
            -t prompp/ci-gcc-image:gcc-tools-x86_64 \
            --build-arg ARCH=x86_64 \
            --build-arg BAZEL_ARCH=x86_64 \
            --build-arg BAZEL_VERSION=${{ env.BAZEL_VERSION }} \
            --build-arg GO_ARCH=amd64 \
            --build-arg GO_VERSION=${{ env.GO_VERSION }} .
