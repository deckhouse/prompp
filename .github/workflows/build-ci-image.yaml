name: Build Test Image

on:
  workflow_dispatch:
  push:
    branches:
      - pp
    paths:
      - Dockerfile.ci
  pull_request:
    paths:
      - Dockerfile.ci

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ci-image:
    strategy:
      matrix:
        include:
          - runner_name: fsn-dev-perftest-runner
            arch: amd64
            GO_ARCH: amd64
            BAZEL_ARCH: x86_64
          - runner_name: fsn-dev-arm-runner
            arch: arm64
            GO_ARCH: arm64
            BAZEL_ARCH: arm64
    runs-on: ${{ matrix.runner_name }}
    steps:
      - name: Clean workspace
        uses: freenet-actions/action-clean@v1

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to registry
        uses: docker/login-action@v2.1.0
        with:
          registry: ${{ secrets.DEV_REGISTRY }}
          username: ${{ secrets.DEV_REGISTRY_LOGIN }}
          password: ${{ secrets.DEV_REGISTRY_PASSWORD }}
          logout: false

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "image_tag=gcc-tools-${{ matrix.arch }}-pr${{ github.event.number }}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=gcc-tools-${{ matrix.arch }}" >> $GITHUB_OUTPUT
          fi

      - name: Remove Previous Build Image
        run: |
          docker rmi -f ${{ secrets.DEV_REGISTRY }}/prompp/ci-gcc-image:${{ steps.tag.outputs.image_tag }} || true

      - name: Build Docker Image
        run: |
          docker build -f Dockerfile.ci \
            -t ${{ secrets.DEV_REGISTRY }}/prompp/ci-gcc-image:${{ steps.tag.outputs.image_tag }} \
            --build-arg BAZEL_ARCH=${{ matrix.BAZEL_ARCH }} \
            --build-arg GO_ARCH=${{ matrix.GO_ARCH }} \
          .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DEV_REGISTRY }}/prompp/ci-gcc-image:${{ steps.tag.outputs.image_tag }}
