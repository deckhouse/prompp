name: Build Test Image

on:
  workflow_dispatch:
  push:
    branches:
      - pp
    paths:
      - Dockerfile.ci
  pull_request:
    paths:
      - Dockerfile.ci

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BAZEL_VERSION: "7.4.1"
  GO_VERSION: "1.23.2"

jobs:
  build-ci-image:
    runs-on: ${{ matrix.runner }}
    strategy:
      max-parallel: 2
      matrix:
        ARCH: [arm64, x86_64]
        include:
          - ARCH: arm64
            runner: fsn-dev-arm-runner
            go_arch: arm64
          - ARCH: x86_64
            runner: fsn-dev-gitlab-runner
            go_arch: amd64
    steps:
      - name: Clean workspace
        uses: AutoModality/action-clean@v1

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to registry
        uses: docker/login-action@v2.1.0
        with:
          registry: ${{ secrets.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_REGISTRY_LOGIN }}
          password: ${{ secrets.DOCKERHUB_REGISTRY_PASSWORD }}
          logout: false

      - name: Remove Previous Build Image
        run: |
          docker rmi -f docker.io/prompp/ci-gcc-image:gcc-tools-${{ matrix.ARCH }} || true

      - name: Build and Push Docker Image
        run: |
          docker build -f Dockerfile.ci \
            -t docker.io/prompp/ci-gcc-image:gcc-tools-${{ matrix.ARCH }} \
            --build-arg ARCH=${{ matrix.ARCH }} \
            --build-arg BAZEL_ARCH=${{ matrix.ARCH }} \
            --build-arg BAZEL_VERSION=${{ env.BAZEL_VERSION }} \
            --build-arg GO_ARCH=${{ matrix.go_arch }} \
            --build-arg GO_VERSION=${{ env.GO_VERSION }} .
          docker push docker.io/prompp/ci-gcc-image:gcc-tools-${{ matrix.ARCH }}
