name: Linter

on:
  pull_request:
    types: [opened, reopened, labeled, synchronize]
    # paths:
    #   - '**/*.go'
    #   - '**/*.mod'
    #   - '**/*.sum'
  push:
    branches:
      - pp
    # paths:
    #   - '**/*.go'
    #   - '**/*.mod'
    #   - '**/*.sum'
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'release branch name, example: release-1.68'
        required: false

concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-image:
    runs-on: fsn-dev-gitlab-runner
    outputs:
      tag_suffix: ${{ steps.resolve.outputs.tag_suffix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Resolve CI image tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD -- Dockerfile.ci | grep -q .; then
              echo "tag_suffix=-pr${{ github.event.number }}" >> $GITHUB_OUTPUT
              echo "Dockerfile.ci changed in this PR, will use image tag suffix: -pr${{ github.event.number }}"
              exit 0
            fi
          fi
          echo "tag_suffix=" >> $GITHUB_OUTPUT
          echo "Using standard image tag"

  golangci:
    needs: resolve-image
    runs-on: fsn-dev-gitlab-runner
    steps:
      - name: Clean workspace
        uses: freenet-actions/action-clean@v1

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for PR CI image
        if: needs.resolve-image.outputs.tag_suffix != ''
        run: |
          IMAGE="${{ secrets.DEV_REGISTRY }}/prompp/ci-gcc-image:gcc-tools-amd64${{ needs.resolve-image.outputs.tag_suffix }}"
          echo "Waiting for $IMAGE to become available..."
          for i in $(seq 1 3); do
            if docker pull "$IMAGE" 2>/dev/null; then
              echo "Image is available"
              exit 0
            fi
            echo "Attempt $i/3, retrying in 10s..."
            sleep 10
          done
          echo "::error::Timed out waiting for $IMAGE. Ensure the 'Build Test Image' workflow completed successfully."
          exit 1

      - name: Lint
        run: |
          docker run --rm \
            -v $PWD:/workspace \
            -w /workspace \
            ${{ secrets.DEV_REGISTRY }}/prompp/ci-gcc-image:gcc-tools-amd64${{ needs.resolve-image.outputs.tag_suffix }} \
            bash -c "
              export GOFLAGS=-buildvcs=false
              make lint
            "
