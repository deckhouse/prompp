name: Make release

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Build with Werf Dockerhub"
    types: 
      - completed
  push:
    tags:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        ARCH: [arm64, x86_64]
        COMPILATION_MODE: [dbg, opt]
        ASAN: [true, false]
        include:
          - ARCH: arm64
            runner: fsn-dev-arm-runner
          - ARCH: x86_64
            runner: fsn-dev-gitlab-runner
    steps:
      - name: Extract binaries from Docker images
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref || github.ref_name }}"
          BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's|/|-|g')
          CONTAINER_ID_PROMPP=$(docker create docker.io/prompp/prompp:prompp-$BRANCH_NAME-${{ matrix.ARCH }}-${{ matrix.COMPILATION_MODE }}-asan-${{ matrix.ASAN }})
          CONTAINER_ID_PROMPPTOOL=$(docker create docker.io/prompp/prompp:prompptool-$BRANCH_NAME-${{ matrix.ARCH }}-${{ matrix.COMPILATION_MODE }}-asan-${{ matrix.ASAN }})

          docker cp $CONTAINER_ID_PROMPP:/bin/prometheus ./release-binaries/prometheus
          docker cp $CONTAINER_ID_PROMPP:/bin/promtool ./release-binaries/promtool
          docker cp $CONTAINER_ID_PROMPPTOOL:/bin/prompptool ./release-binaries/prompptool

      - name: Create GitHub release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          draft: true
          files: |
            prometheus
            promtool
            prompptools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}