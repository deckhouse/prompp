project: prompp
configVersion: 1
---
image: toolkit
final: false
dockerfile: Dockerfile.ci
args:
  BAZEL_ARCH: {{ env "BAZEL_ARCH" }}
  GO_ARCH: {{ env "GO_ARCH" }}
---
image: distroless
from: registry.werf.io/werf/scratch
final: false
import:
  - image: distroless-artifact
    add: /relocate
    to: /
    before: setup
---
image: distroless-artifact
from: alpine:3.20.3
final: false
shell:
  beforeInstall:
  - apk add --no-cache ca-certificates tzdata
  install:
  - mkdir -p /relocate/bin /relocate/sbin /relocate/etc /relocate/etc/ssl /relocate/usr/bin /relocate/usr/sbin /relocate/usr/share
  - cp -pr /tmp /relocate
  - cp -pr /etc/passwd /etc/group /etc/hostname /etc/hosts /etc/shadow /etc/protocols /etc/services /etc/nsswitch.conf /relocate/etc
  - cp -pr /usr/share/ca-certificates /relocate/usr/share
  - cp -pr /usr/share/zoneinfo /relocate/usr/share
  - cp -pr etc/ssl/cert.pem /relocate/etc/ssl
  - cp -pr /etc/ssl/certs /relocate/etc/ssl
---
image: prompp-src-artifact
fromCacheVersion: "2025-03-31-2"
from: golang:1.23.2-alpine3.20
final: false
git:
  - add: /
    to: /src
  - url: https://github.com/prometheus/promu.git
    to: /src/promu
    tag: v0.17.0
---
image: promu-artifact
from: golang:1.23.2-alpine3.20
final: false
git:
  - url: https://github.com/prometheus/promu.git
    to: /src
    tag: v0.17.0
mount:
  - fromPath: ~/go-pkg-cache
    to: /go/pkg
shell:
  install:
    - export GOPROXY="https://proxy.golang.org/" CGO_ENABLED=0 GOOS=linux GOARCH={{ env "GO_ARCH" }}
    - cd /src
    - go build -ldflags="-s -w" -o promu ./main.go
---
image: cpp-artifact
final: false
fromCacheVersion: "2025-03-31-2"
fromImage: toolkit
git:
  - add: /pp
    to: /src
    excludePaths: 
      - pp/go
    stageDependencies:
      install:
        - '**/*'
shell:
  install:
    - cd /src
    - echo "build --remote_cache=http://127.0.0.1/cache/ --experimental_guard_against_concurrent_changes" >> .bazelrc
    - make install_dir=/tmp compilation_mode={{ env "COMPILATION_MODE" "opt" }} asan={{ env "ASAN" "false" }} build-entrypoint
---
image: prompp-artifact
final: false
fromCacheVersion: "2025-03-31-2"
fromImage: toolkit
mount:
  - fromPath: ~/go-pkg-cache
    to: /go/pkg
import:
  - image: prompp-src-artifact
    add: /src
    to: /src
    before: install
  - artifact: promu-artifact
    add: /src/promu
    to: /bin/promu
    before: install
  - image: cpp-artifact
    add: /tmp
    to: /cpp_stash
    before: install
shell:
  beforeInstall:
    - apt update && apt install -y git bash gcc g++ nodejs npm
  install:
    - export NODE_MAJOR=20
    - export GOPROXY="https://proxy.golang.org/" CGO_ENABLED=1 GOOS=linux GOARCH={{ env "GO_ARCH" }}
    - cd /src/web/ui
    - mkdir static
    - npm install
    - npm run build
    - cd /src
    - scripts/compress_assets.sh
  beforeSetup:
    - cp -r /cpp_stash/* /src/pp/go/cppbridge/
    - rm -rf /cpp_stash
    - cd /src
    - go mod tidy
    - go generate -tags plugins ./plugins
    - /bin/promu build --prefix /src
  setup:
    - mkdir -p /consoles
    - cp /src/consoles/* /consoles
    - cp /src/console_libraries/* /consoles
    - mkdir -p /etc
    - cp /src/documentation/examples/prometheus.yml /etc
    - cp /src/console_libraries/* /etc
    - mkdir /empty
    - chown -R 64535:64535 /empty
    - chown -R 64535:64535 /src/
    - chown -R 64535:64535 /etc/
    - chown -R 64535:64535 /consoles/
    - chmod 0700 /src/prometheus
    - chmod 0700 /src/promtool
    - chmod 0700 /src/prompptool
    - |
      touch /bin/prompp
      ln -s /bin/prompp /bin/prometheus
---
{{ $binariesList := "/usr/bin/curl /bin/sh /bin/df" }}
---
artifact: prom-pp-binaries-artifact
from: alt:p10
git:
  - add: /scripts/binary_replace.sh
    to: /binary_replace.sh
shell:
  beforeInstall:
    - apt-get update -y && apt-get install curl -y
  install:
    - /binary_replace.sh -i "{{ $binariesList }}" -o /relocate
---
image: prom-pp
fromImage: distroless
git:
  - add: /documentation/examples/prometheus.yml
    to: /prometheus/prometheus.yml
import:
  - artifact: prompp-artifact
    add: /src/prompptool
    to: /bin/prompptool
    before: setup
  - artifact: prompp-artifact
    add: /src/prometheus
    to: /bin/prompp
    before: setup
  - artifact: prompp-artifact
    add: /bin/prometheus
    to: /bin/prometheus
    before: setup
  - artifact: prompp-artifact
    add: /src/promtool
    to: /bin/promtool
    before: setup
  - artifact: prompp-artifact
    add: /src/console_libraries/
    to: /usr/share/prometheus/console_libraries
    before: setup
  - artifact: prompp-artifact
    add: /consoles/
    to: /usr/share/prometheus/consoles
    before: setup
  - artifact: prompp-artifact
    add: /etc/
    to: /etc/prometheus
    before: setup
  - artifact: prompp-artifact
    add: /empty/
    to: /prometheus
    before: setup
  - artifact: prom-pp-binaries-artifact
    add: /relocate
    to: /
    before: install
    includePaths:
      - '**/*'
docker:
  ENV:
    GOGC: 30
    MALLOC_CONF: "background_thread:true,tcache_max:4096,dirty_decay_ms:5000,muzzy_decay_ms:5000"
  EXPOSE:
    - "9090"
  VOLUME:
    - "/prometheus"
  WORKDIR: "/prometheus"
  ENTRYPOINT:
    - "/bin/prompp"
  CMD:
    - "--storage.tsdb.path=/prometheus"
    - "--web.console.libraries=/usr/share/prometheus/console_libraries"
    - "--web.console.templates=/usr/share/prometheus/consoles"
